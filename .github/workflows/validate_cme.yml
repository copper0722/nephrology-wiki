name: Validate CME

on:
  push:
  workflow_dispatch:

jobs:
  validate-cme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Validate CME Markdown
        run: python3 scripts/validate_cme.py
